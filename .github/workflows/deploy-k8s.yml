name: Deploy To Kubernetes

on:
  push:
    branches:
    - main
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner to use for deployment"
        required: true
        default: self-hosted
        type: choice
        options:
        - self-hosted
        - ubuntu-latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: aura

jobs:
  deploy-self-hosted:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted') }}
    runs-on: [self-hosted, windows]
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Compute image naming variables
      id: vars
      run: |
        $ownerLc = $env:GITHUB_REPOSITORY_OWNER.ToLower()
        Add-Content -Path $env:GITHUB_OUTPUT -Value "owner_lc=$ownerLc"
      shell: powershell

    - name: Log in to GHCR
      run: |
        "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      shell: powershell

    - name: Build and push backend image
      run: |
        docker build -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:sha-${{ github.sha }} -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:latest ./backend
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:sha-${{ github.sha }}
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:latest
      shell: powershell

    - name: Build and push frontend image
      run: |
        docker build -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:sha-${{ github.sha }} -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:latest ./frontend
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:sha-${{ github.sha }}
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:latest
      shell: powershell

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Configure kubeconfig
      env:
        KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      run: |
        $kubeDir = Join-Path $env:USERPROFILE ".kube"
        if (-not (Test-Path $kubeDir)) {
          New-Item -ItemType Directory -Path $kubeDir -Force | Out-Null
        }
        $kubeConfigPath = Join-Path $kubeDir "config"
        $decodedBytes = [System.Convert]::FromBase64String($env:KUBE_CONFIG_DATA)
        [System.IO.File]::WriteAllBytes($kubeConfigPath, $decodedBytes)
        Write-Host "Kubeconfig configured"
      shell: powershell

    - name: Create namespace
      run: kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply backend secret
      env:
        MONGO_URL: ${{ secrets.MONGO_URL }}
        DB_NAME: ${{ secrets.DB_NAME }}
        CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY }}
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
      run: |
        kubectl -n ${{ env.NAMESPACE }} create secret generic aura-backend-secrets `
          --from-literal=MONGO_URL="$env:MONGO_URL" `
          --from-literal=DB_NAME="$env:DB_NAME" `
          --from-literal=CORS_ORIGINS="$env:CORS_ORIGINS" `
          --from-literal=JWT_SECRET="$env:JWT_SECRET" `
          --from-literal=EMERGENT_LLM_KEY="$env:EMERGENT_LLM_KEY" `
          --from-literal=RAZORPAY_KEY_ID="$env:RAZORPAY_KEY_ID" `
          --from-literal=RAZORPAY_KEY_SECRET="$env:RAZORPAY_KEY_SECRET" `
          --from-literal=CLOUDINARY_CLOUD_NAME="$env:CLOUDINARY_CLOUD_NAME" `
          --from-literal=CLOUDINARY_API_KEY="$env:CLOUDINARY_API_KEY" `
          --from-literal=CLOUDINARY_API_SECRET="$env:CLOUDINARY_API_SECRET" `
          --from-literal=OPENAI_API_KEY="$env:OPENAI_API_KEY" `
          --from-literal=SENDER_EMAIL="$env:SENDER_EMAIL" `
          --from-literal=SENDER_PASSWORD="$env:SENDER_PASSWORD" `
          --from-literal=SMTP_SERVER="$env:SMTP_SERVER" `
          --from-literal=SMTP_PORT="$env:SMTP_PORT" `
          --dry-run=client -o yaml | kubectl apply -f -
      shell: powershell

    - name: Apply GHCR pull secret (optional)
      env:
        GHCR_PULL_SECRET_NAME: ${{ secrets.GHCR_PULL_SECRET_NAME }}
        GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      run: |
        if ($env:GHCR_PULL_SECRET_NAME -and $env:GHCR_USERNAME -and $env:GHCR_TOKEN) {
          kubectl -n ${{ env.NAMESPACE }} create secret docker-registry $env:GHCR_PULL_SECRET_NAME --docker-server=${{ env.REGISTRY }} --docker-username="$env:GHCR_USERNAME" --docker-password="$env:GHCR_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
          Write-Host "GHCR pull secret created"
        } else {
          Write-Host "Skipping GHCR pull secret"
        }
      shell: powershell

    - name: Deploy with Helm
      env:
        GHCR_PULL_SECRET_NAME: ${{ secrets.GHCR_PULL_SECRET_NAME }}
      run: |
        helm upgrade --install aura ./helm/aura `
          --namespace ${{ env.NAMESPACE }} `
          --create-namespace `
          --set global.namespace=${{ env.NAMESPACE }} `
          --set ingress.host=${{ secrets.APP_HOST }} `
          --set backend.image.repository=${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/aura-backend `
          --set backend.image.tag=sha-${{ github.sha }} `
          --set frontend.image.repository=${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/aura-frontend `
          --set frontend.image.tag=sha-${{ github.sha }} `
          --set monitoring.serviceMonitor.enabled=false
      shell: powershell

    - name: Verify rollout
      run: |
        kubectl -n ${{ env.NAMESPACE }} rollout status deploy/aura-aura-backend --timeout=180s
        kubectl -n ${{ env.NAMESPACE }} rollout status deploy/aura-aura-frontend --timeout=180s

  deploy-ubuntu:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'ubuntu-latest' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Compute image naming variables
      id: vars
      run: |
        owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
        echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Build and push backend image
      run: |
        docker build -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:sha-${{ github.sha }} -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:latest ./backend
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:sha-${{ github.sha }}
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-backend:latest

    - name: Build and push frontend image
      run: |
        docker build -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:sha-${{ github.sha }} -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:latest ./frontend
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:sha-${{ github.sha }}
        docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/aura-frontend:latest

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

    - name: Validate kubeconfig endpoint for GitHub-hosted runner
      run: |
        SERVER_URL="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
        echo "Kubernetes API server: $SERVER_URL"
        if [[ "$SERVER_URL" =~ ^https?://(127\.0\.0\.1|localhost)(:[0-9]+)?(/|$) ]]; then
          echo "::error::KUBE_CONFIG_DATA points to a localhost API endpoint ($SERVER_URL)."
          echo "::error::GitHub-hosted runners cannot access your local cluster. Use self-hosted runner or a publicly reachable cluster API endpoint."
          exit 1
        fi

    - name: Create namespace
      run: kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply backend secret
      env:
        MONGO_URL: ${{ secrets.MONGO_URL }}
        DB_NAME: ${{ secrets.DB_NAME }}
        CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY }}
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
      run: |
        kubectl -n ${{ env.NAMESPACE }} create secret generic aura-backend-secrets \
          --from-literal=MONGO_URL="$MONGO_URL" \
          --from-literal=DB_NAME="$DB_NAME" \
          --from-literal=CORS_ORIGINS="$CORS_ORIGINS" \
          --from-literal=JWT_SECRET="$JWT_SECRET" \
          --from-literal=EMERGENT_LLM_KEY="$EMERGENT_LLM_KEY" \
          --from-literal=RAZORPAY_KEY_ID="$RAZORPAY_KEY_ID" \
          --from-literal=RAZORPAY_KEY_SECRET="$RAZORPAY_KEY_SECRET" \
          --from-literal=CLOUDINARY_CLOUD_NAME="$CLOUDINARY_CLOUD_NAME" \
          --from-literal=CLOUDINARY_API_KEY="$CLOUDINARY_API_KEY" \
          --from-literal=CLOUDINARY_API_SECRET="$CLOUDINARY_API_SECRET" \
          --from-literal=OPENAI_API_KEY="$OPENAI_API_KEY" \
          --from-literal=SENDER_EMAIL="$SENDER_EMAIL" \
          --from-literal=SENDER_PASSWORD="$SENDER_PASSWORD" \
          --from-literal=SMTP_SERVER="$SMTP_SERVER" \
          --from-literal=SMTP_PORT="$SMTP_PORT" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply GHCR pull secret (optional)
      env:
        GHCR_PULL_SECRET_NAME: ${{ secrets.GHCR_PULL_SECRET_NAME }}
        GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      run: |
        if [ -n "$GHCR_PULL_SECRET_NAME" ] && [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
          kubectl -n ${{ env.NAMESPACE }} create secret docker-registry "$GHCR_PULL_SECRET_NAME" --docker-server=${{ env.REGISTRY }} --docker-username="$GHCR_USERNAME" --docker-password="$GHCR_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
          echo "GHCR pull secret created"
        else
          echo "Skipping GHCR pull secret"
        fi

    - name: Deploy with Helm
      run: |
        helm upgrade --install aura ./helm/aura \
          --namespace ${{ env.NAMESPACE }} \
          --create-namespace \
          --set global.namespace=${{ env.NAMESPACE }} \
          --set ingress.host=${{ secrets.APP_HOST }} \
          --set backend.image.repository=${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/aura-backend \
          --set backend.image.tag=sha-${{ github.sha }} \
          --set frontend.image.repository=${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/aura-frontend \
          --set frontend.image.tag=sha-${{ github.sha }} \
          --set monitoring.serviceMonitor.enabled=false

    - name: Verify rollout
      run: |
        kubectl -n ${{ env.NAMESPACE }} rollout status deploy/aura-aura-backend --timeout=180s
        kubectl -n ${{ env.NAMESPACE }} rollout status deploy/aura-aura-frontend --timeout=180s
