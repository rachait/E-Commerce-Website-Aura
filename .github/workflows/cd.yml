name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (defaults to short SHA)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/aura-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/aura-frontend
  HELM_NAMESPACE: aura
  HELM_RELEASE: aura

jobs:
  # ── Build & Push Docker images ─────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes via Helm ──────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes (namespace: aura)
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Create namespace (idempotent)
        run: kubectl create namespace ${{ env.HELM_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} helm/aura \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --set backend.image.repository=${{ env.BACKEND_IMAGE }} \
            --set backend.image.tag=${{ needs.build-push.outputs.image_tag }} \
            --set frontend.image.repository=${{ env.FRONTEND_IMAGE }} \
            --set frontend.image.tag=${{ needs.build-push.outputs.image_tag }} \
            --atomic \
            --timeout 5m \
            --wait

      - name: Verify rollout – backend
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-backend \
            -n ${{ env.HELM_NAMESPACE }} --timeout=120s

      - name: Verify rollout – frontend
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-frontend \
            -n ${{ env.HELM_NAMESPACE }} --timeout=120s

      - name: Smoke test – backend health
        run: |
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:8.8.0 \
            -n ${{ env.HELM_NAMESPACE }} -- \
            curl -sf http://${{ env.HELM_RELEASE }}-backend:8000/healthz

      - name: Verify Prometheus ServiceMonitor
        run: |
          kubectl get servicemonitor ${{ env.HELM_RELEASE }}-backend \
            -n ${{ env.HELM_NAMESPACE }} \
            -o jsonpath='{.spec.endpoints[0].path}' | grep -q "/metrics"
          echo "ServiceMonitor is present and scrapes /metrics"
