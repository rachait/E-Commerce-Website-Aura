name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 . --max-line-length=100 --exclude=__pycache__

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build Docker image (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: aura-backend:ci

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend – Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Docker image (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: aura-frontend:ci

  # ── Helm lint ──────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm – Lint & Template Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Helm lint
        run: helm lint helm/aura

      - name: Helm template (dry-run render)
        run: |
          helm template aura helm/aura \
            --set backend.image.tag=ci \
            --set frontend.image.tag=ci \
            --namespace aura \
            --debug
