name: Bug report
description: Report a reproducible bug in AURA
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail to reproduce the issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Database
        - DevOps/Deployment
        - Documentation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser, Node/Python versions
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
