name: Feature request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Please explain the problem and the value this feature adds.
  - type: input
    id: summary
    attributes:
      label: Feature summary
      placeholder: Short title for the feature
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your suggested implementation or UX
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Checkout/Payments
        - AI features
        - DevOps/Deployment
        - Documentation
    validations:
      required: true
