apiVersion: v1
kind: Service
metadata:
  name: {{ include "aura.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aura.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "aura.name" . }}-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
