{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aura.fullname" . }}-mongodb
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: aura-mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aura-mongodb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aura-mongodb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: mongodb
        image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
        imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
        ports:
        - containerPort: 27017
          name: mongo
        volumeMounts:
        - name: data
          mountPath: /data/db
        readinessProbe:
          tcpSocket:
            port: mongo
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: mongo
          initialDelaySeconds: 20
          periodSeconds: 20
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "aura.fullname" . }}-mongodb
{{- end }}